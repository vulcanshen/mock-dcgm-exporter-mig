apiVersion: v1
kind: Service
metadata:
  name: {{ include "mock-dcgm-exporter-mig.fullname" . }}
  labels:
    {{- include "mock-dcgm-exporter-mig.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "mock-dcgm-exporter-mig.selectorLabels" . | nindent 4 }}
