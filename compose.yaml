services:
  mock-dcgm-exporter-mig:
    image: vulcanshen2304/mock-dcgm-exporter-mig:latest
    ports:
      - "9400:9400"
    volumes:
      - ./config.yaml:/config.yaml:ro

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - mock-dcgm-exporter-mig
