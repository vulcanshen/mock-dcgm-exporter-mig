version: 2

project_name: mock-dcgm-exporter-mig

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    files:
      - config.yaml
      - README.md
      - LICENSE

dockers:
  - image_templates:
      - "{{ .Env.DOCKER_OWNER }}/mock-dcgm-exporter-mig:{{ .Version }}-amd64"
      - "{{ .Env.DOCKER_OWNER }}/mock-dcgm-exporter-mig:latest-amd64"
    dockerfile: Dockerfile.release
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    extra_files:
      - config.yaml
    goarch: amd64
  - image_templates:
      - "{{ .Env.DOCKER_OWNER }}/mock-dcgm-exporter-mig:{{ .Version }}-arm64"
      - "{{ .Env.DOCKER_OWNER }}/mock-dcgm-exporter-mig:latest-arm64"
    dockerfile: Dockerfile.release
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    extra_files:
      - config.yaml
    goarch: arm64

docker_manifests:
  - name_template: "{{ .Env.DOCKER_OWNER }}/mock-dcgm-exporter-mig:{{ .Version }}"
    image_templates:
      - "{{ .Env.DOCKER_OWNER }}/mock-dcgm-exporter-mig:{{ .Version }}-amd64"
      - "{{ .Env.DOCKER_OWNER }}/mock-dcgm-exporter-mig:{{ .Version }}-arm64"
  - name_template: "{{ .Env.DOCKER_OWNER }}/mock-dcgm-exporter-mig:latest"
    image_templates:
      - "{{ .Env.DOCKER_OWNER }}/mock-dcgm-exporter-mig:latest-amd64"
      - "{{ .Env.DOCKER_OWNER }}/mock-dcgm-exporter-mig:latest-arm64"

changelog:
  sort: asc
